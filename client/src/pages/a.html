<!DOCTYPE html>
<html>
<body>

<h1 align="center" style="color: blue;">Logo</h1>

<form>

    <!-- First name + Last name -->
    <table align="center" cellpadding="8">
        <tr>
            <td>
                <input type="text" placeholder="First name" size="22">
            </td>
            <td>
                <input type="text" placeholder="Last name" size="22">
            </td>
        </tr>

        <!-- Email -->
        <tr>
            <td colspan="2">
                <input type="email" placeholder="Enter your email" size="50">
            </td>
        </tr>

        <!-- About you -->
        <tr>
            <td colspan="2">
                <textarea placeholder="About you" rows="6" cols="52"></textarea>
            </td>
        </tr>

        <!-- Button -->
        <tr>
            <td colspan="2" align="center">
                <button style="background-color: blue; color: white;">Continue</button>
            </td>
        </tr>

    </table>

</form>

</body>
</html>
